<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-gallery.css">
    <title>Gallery</title>
</head>
<body>
<!-- Header-section-start -->
    <header class="header-section">
        <div class="navbar">
            <img src="images/logoicons/blacksmith.png" alt="Blacksmith and anvil icon">
            <img src="images/logoicons/paper-crafts.png" alt="Scissors and paper icon">
            <h1 class="logo-text">Craftsvilla</h1>
            <img src="images/logoicons/handcraft.png" alt="Handcraft tools icon">
            <img src="images/logoicons/tool-box.png" alt="Toolbox icon">
        </div>

        <nav class="navbar-2">
            <a href="index.html">Home</a>
            <a href="booking.html">Booking</a>
            <a href="gallery.html">Gallery</a>
            <a href="feedback.html">Feedback</a>
        </nav>
    </header>
<!-- Header-section-end -->

<!-- Main-section-start -->
    <section class="main-section">
        <div class="slideshow-container">
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>

            <div class="mySlides fade">
                <h2>Open Air Workshop</h2>
                <img src="images/slideshow/slideshow3.png" alt="Open air workshop">
            </div>

            <div class="mySlides fade">
                <h2>Metal Workshop</h2>
                <img src="images/slideshow/slideshow1.png" alt="Metal workshop">
            </div>

            <div class="mySlides fade">
                <h2>Painters Workshop</h2>
                <img src="images/slideshow/slideshow2.png" alt="Painters workshop">
            </div>

            <div class="mySlides fade">
                <h2>Woodwork Shop</h2>
                <img src="images/slideshow/slideshow4.png" alt="Woodwork workshop">
            </div>

            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>

        <div class="dots-container">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
        </div>
    </section>
<!-- Main-section-end -->

<!-- Footer-section-start -->
    <footer class="footer-section">
        <div class="footer-btn-box">
            <a href="index.html">Home</a>
            <a href="booking.html">Booking</a>
            <a href="gallery.html">Gallery</a>
            <a href="feedback.html">Feedback</a>
        </div>

        <div class="footer-textbox">
            <p>Address:</p>
            <p class="footer-txt2">Toolstreet 20</p>
            <p>Phone:</p>
            <p class="footer-txt2">40231942</p>
            <p>Email:</p>
            <p class="footer-txt2">craftsvilla@gmail.com</p>
        </div>
    </footer>
<!-- Footer-section-end -->
 
    <script src="script.js"></script>
</body>
</html>
